services:
  db:
    image: postgres:16
    container_name: taskr_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: taskr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskr"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: taskr_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://postgres:root@db:5432/taskr?schema=public"
      ALLOWED_ORIGINS: "http://localhost:3000"
      PORT: 8000
      ACCESS_TOKEN_SECRET: "9bG7zK2hQf3dP8vWxR1tS4yJ0mLqH5nZ"
      ACCESS_TOKEN_EXPIRY: "15m"
      REFRESH_TOKEN_SECRET: "Y3rV8pLkF5wN1xT7bQ0sC2zM9hG4dJ6o"
      REFRESH_TOKEN_EXPIRY: "1d"
      ENVIRONMENT: "production"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000/api"
    container_name: taskr_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@taskr.com"
      PGADMIN_DEFAULT_PASSWORD: "admin"
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: